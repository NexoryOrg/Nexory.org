name: Code Quality

on:
  push:
    branches: [main, testing-area]
  pull_request:
    branches: [main, testing-area]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: nexory-dev/frontend
      - name: Lint
        run: npm run lint
        working-directory: nexory-dev/frontend
      - name: Test
        run: npm test -- --watchAll=false
        working-directory: nexory-dev/frontend
